name: Setup Windows RDP Ultimate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install dan Connect Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          Write-Host "Mengunduh Tailscale..."
          $url = "[pkgs.tailscale.com](https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe)"
          $wc = New-Object System.Net.WebClient
          $wc.DownloadFile($url, "tailscale-setup.exe")

          $fileSize = (Get-Item "tailscale-setup.exe").Length
          Write-Host "Ukuran file: $fileSize bytes"
          if ($fileSize -lt 1000000) { throw "Unduhan gagal atau file rusak!" }

          Write-Host "Menginstal Tailscale..."
          Start-Process -FilePath '.\tailscale-setup.exe' -ArgumentList '/quiet' -Wait

          Write-Host "Autentikasi Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTHKEY --unattended --hostname=rdp-abadi
        shell: powershell

      - name: Membuat User dan Mengaktifkan RDP
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          Write-Host "Menambahkan User..."
          net user Adysetia "$env:RDP_PASSWORD" /add
          net localgroup administrators Adysetia /add
          net localgroup "Remote Desktop Users" Adysetia /add

          Write-Host "Membuat Folder Desktop..."
          New-Item -ItemType Directory -Force -Path "C:\Users\Adysetia\Desktop"

          Write-Host "Mengaktifkan RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Write-Host "Mematikan UAC..."
          Set-ItemProperty -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -Value 0
        shell: powershell

      - name: Optimasi Performa (Disable Defender)
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableArchiveScanning $true
          Set-MpPreference -DisableBehaviorMonitoring $true
          Set-MpPreference -DisableIOAVProtection $true
        shell: powershell
        continue-on-error: true

      - name: Install WinRAR & .NET 6.0
        run: |
          choco install winrar dotnet-6.0-desktopruntime -y
        shell: powershell

      - name: Tampilkan Info Koneksi
        run: |
          Write-Host "========================================"
          Write-Host "RDP Server aktif via Tailscale MagicDNS"
          Write-Host "Username   : Adysetia"
          Write-Host "Host RDP   : rdp-abadi.[NAMA_TAILNET_ANDA]"
          Write-Host "========================================"
        shell: powershell

      - name: Keep-Alive
        run: |
          Write-Host "Sesi aktif. Maksimal 6 jam."
          while ($true) { Start-Sleep -Seconds 300 }
        shell: powershell
