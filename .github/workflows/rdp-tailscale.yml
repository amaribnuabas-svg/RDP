name: Setup Windows RDP Ultimate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install dan Connect Tailscale (Silent)
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Write-Host "Mengunduh dan menginstal Tailscale..."
          Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe' -OutFile 'tailscale-setup.exe'
          Start-Process -FilePath '.\tailscale-setup.exe' -ArgumentList '/quiet' -Wait
          
          Write-Host "Autentikasi Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --unattended --hostname="rdp-abadi"
        shell: powershell

      - name: Membuat User dan Mengaktifkan RDP (Silent)
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          Write-Host "Menyiapkan User, RDP, dan Folder Desktop..."
          net user Adysetia "$env:RDP_PASSWORD" /add > $null 2>&1
          net localgroup administrators Adysetia /add > $null 2>&1
          net localgroup "Remote Desktop Users" Adysetia /add > $null 2>&1

          New-Item -ItemType Directory -Force -Path "C:\Users\Adysetia\Desktop" > $null 2>&1
          
          # Folder untuk FileZilla Server
          New-Item -ItemType Directory -Force -Path "C:\Users\Adysetia\Desktop\SEA" > $null 2>&1

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" > $null 2>&1
          Set-ItemProperty -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -Value 0
        shell: powershell

      - name: Optimasi Performa (Disable Defender)
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableArchiveScanning $true
          Set-MpPreference -DisableBehaviorMonitoring $true
          Set-MpPreference -DisableIOAVProtection $true
        shell: powershell
        continue-on-error: true

      - name: Install WinRAR, .NET 6.0 & FileZilla Server (Silent)
        run: |
          Write-Host "Menginstal WinRAR, .NET 6.0, dan FileZilla Server..."
          choco install winrar dotnet-6.0-desktopruntime filezilla-server -y --no-progress --limit-output

          Write-Host "Membuka Port Firewall FTP (21) & Passive (20000-20100)..."
          New-NetFirewallRule -DisplayName "FTP Command Port 21" -Direction Inbound -LocalPort 21 -Protocol TCP -Action Allow > $null 2>&1
          New-NetFirewallRule -DisplayName "FTP Passive Ports" -Direction Inbound -LocalPort 20000-20100 -Protocol TCP -Action Allow > $null 2>&1
        shell: powershell

      - name: Tampilkan Info Koneksi
        run: |
          $TailscaleIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================"
          Write-Host "RDP Server aktif via Tailscale MagicDNS"
          Write-Host "Username   : Adysetia"
          Write-Host "Host RDP   : rdp-abadi.[NAMA_TAILNET_ANDA]"
          Write-Host "IP Tailscale: $TailscaleIP"
          Write-Host "========================================"
          Write-Host "Akses FTP Server (Konfigurasi User & Password via RDP):"
          Write-Host "Host FTP   : $TailscaleIP"
          Write-Host "Passive Port: 20000 - 20100"
          Write-Host "========================================"
        shell: powershell

      - name: Keep-Alive
        run: |
          Write-Host "Sesi aktif. Maksimal 6 jam."
          while ($true) { Start-Sleep -Seconds 300 }
        shell: powershell
        
