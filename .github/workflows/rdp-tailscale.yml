name: Setup Windows RDP Ultimate

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 
    steps:
      - name: Install dan Connect Tailscale
        run: |
          Write-Host "Mengunduh Tailscale..."
          Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe' -OutFile 'tailscale-setup.exe'
          
          Write-Host "Menginstal Tailscale..."
          Start-Process -FilePath '.\tailscale-setup.exe' -ArgumentList '/quiet' -Wait
          
          Write-Host "Menjalankan dan autentikasi Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --unattended
        shell: powershell

      - name: Membuat User dan Mengaktifkan RDP
        run: |
          Write-Host "Menambahkan User..."
          net user Adysetia "${{ secrets.RDP_PASSWORD }}" /add
          net localgroup administrators Adysetia /add
          
          Write-Host "Membuat Folder Desktop secara paksa..."
          New-Item -ItemType Directory -Force -Path "C:\Users\Adysetia\Desktop"
          
          Write-Host "Mengaktifkan RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        shell: powershell

      - name: Optimasi Performa Mesin (Disable Defender)
        run: |
          Write-Host "Mematikan Windows Defender untuk menghemat RAM..."
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableArchiveScanning $true
        shell: powershell
        continue-on-error: true

      - name: Install WinRAR & .NET 6.0
        run: |
          Write-Host "Menginstal WinRAR dan .NET Desktop Runtime 6.0..."
          choco install winrar dotnet-6.0-desktopruntime -y
        shell: powershell

      - name: Menampilkan Informasi Koneksi
        run: |
          $tailscale_ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================"
          Write-Host "RDP Server is running. You can connect now."
          Write-Host "Username   : Adysetia"
          Write-Host "Password   : [Gunakan password di GitHub Secrets]"
          Write-Host "IP Address : $tailscale_ip"
          Write-Host "========================================"
        shell: powershell

      - name: Menjaga RDP Tetap Aktif (Keep-Alive)
        run: |
          Write-Host "Sesi aktif. Mesin akan berjalan hingga maksimal 6 jam."
          Write-Host "Tekan Cancel workflow di GitHub untuk mematikan mesin."
          while ($true) {
            Start-Sleep -Seconds 300
          }
        shell: powershell
        
