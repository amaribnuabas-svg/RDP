name: Setup Windows RDP via Pinggy

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Membuat User dan Mengaktifkan RDP
        run: |
          Write-Host "Menambahkan User..."
          net user Adysetia Ady@123 /add
          net localgroup administrators Adysetia /add
          
          Write-Host "Mengaktifkan RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        shell: powershell

      - name: Menjalankan Pinggy Tunnel
        run: |
          Write-Host "Membuka jalur tunnel menggunakan Pinggy..."
          # Menjalankan SSH di background untuk tunneling
          Start-Process -FilePath "ssh" -ArgumentList "-p 443 -R0:localhost:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@a.pinggy.io" -NoNewWindow -RedirectStandardOutput "pinggy_out.txt" -RedirectStandardError "pinggy_err.txt"
          
          # Tunggu sebentar agar server merespons
          Start-Sleep -Seconds 15
          
          Write-Host "========================================"
          Write-Host "LOG KONEKSI:"
          Get-Content pinggy_out.txt -ErrorAction SilentlyContinue
          Get-Content pinggy_err.txt -ErrorAction SilentlyContinue
          Write-Host "========================================"
          Write-Host "Cari baris yang berawalan tcp:// (Misal: tcp://xxxx.a.free.pinggy.link:12345)"
        shell: powershell

      - name: Menjaga RDP Tetap Aktif
        run: |
          Write-Host "Username: Adysetia"
          Write-Host "Password: Ady@123"
          Start-Sleep -Seconds 21600
        shell: powershell
        
