name: Setup Windows RDP via Bore

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Membuat User dan Mengaktifkan RDP
        run: |
          Write-Host "Menambahkan User..."
          net user Adysetia Ady@123 /add
          net localgroup administrators Adysetia /add
          
          Write-Host "Mengaktifkan RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        shell: powershell

      - name: Install dan Jalankan Bore (Pengganti Ngrok)
        run: |
          Write-Host "Mengunduh Bore..."
          Invoke-WebRequest -Uri 'https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip' -OutFile 'bore.zip'
          Expand-Archive -Path bore.zip -DestinationPath .
          
          Write-Host "Menjalankan tunnel Bore untuk Port 3389 (RDP)..."
          Start-Process -FilePath .\bore.exe -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput "bore_out.txt" -RedirectStandardError "bore_err.txt"
          
          # Tunggu beberapa detik agar terhubung ke server publik Bore
          Start-Sleep -Seconds 5
          
          Write-Host "========================================"
          Write-Host "Log Koneksi Bore:"
          Get-Content bore_out.txt -ErrorAction SilentlyContinue
          Get-Content bore_err.txt -ErrorAction SilentlyContinue
          Write-Host "========================================"
          Write-Host "Cari tulisan seperti 'remote_port=XXXXX' pada log di atas."
          Write-Host "Alamat RDP Anda adalah -> bore.pub:XXXXX (Ganti XXXXX dengan angka port tersebut)"
        shell: powershell

      - name: Menjaga RDP Tetap Aktif
        run: |
          Write-Host "Username: Adysetia"
          Write-Host "Password: Ady@123"
          Write-Host "Masa aktif maksimal: 6 Jam"
          # Menahan agar workflow tidak langsung selesai
          Start-Sleep -Seconds 21600
        shell: powershell
