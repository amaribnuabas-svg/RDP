name: RDP PYTHON

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install dan Connect Tailscale
        run: |
          Write-Host "Mengunduh Tailscale..."
          Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe' -OutFile 'tailscale-setup.exe'
          
          Write-Host "Menginstal Tailscale..."
          Start-Process -FilePath '.\tailscale-setup.exe' -ArgumentList '/quiet' -Wait
          
          Write-Host "Menjalankan dan autentikasi Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --unattended --hostname="rdp-abadi"
        shell: powershell

      - name: Membuat User dan Mengaktifkan RDP
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          Write-Host "Menambahkan User..."
          net user Adysetia "$env:RDP_PASSWORD" /add
          net localgroup administrators Adysetia /add
          net localgroup "Remote Desktop Users" Adysetia /add

          Write-Host "Membuat Folder Desktop..."
          New-Item -ItemType Directory -Force -Path "C:\Users\Adysetia\Desktop"

          Write-Host "Mengaktifkan RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Write-Host "Mematikan UAC..."
          Set-ItemProperty -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -Value 0
        shell: powershell

      - name: Optimasi Performa (Disable Defender)
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableArchiveScanning $true
          Set-MpPreference -DisableBehaviorMonitoring $true
          Set-MpPreference -DisableIOAVProtection $true
        shell: powershell
        continue-on-error: true

      - name: Download dan Install Android NDK
        run: |
          Write-Host "Membuat direktori C:\Android..."
          New-Item -ItemType Directory -Force -Path "C:\Android"
          
          Write-Host "Mengunduh Android NDK (r26d)..."
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r26d-windows.zip" -OutFile "C:\Android\ndk.zip"
          
          Write-Host "Mengekstrak Android NDK (ini memakan waktu sekitar 1-3 menit)..."
          Expand-Archive -Path "C:\Android\ndk.zip" -DestinationPath "C:\Android" -Force
          
          Write-Host "Menambahkan NDK ke System PATH..."
          $ndkPath = "C:\Android\android-ndk-r26d"
          [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$ndkPath", [EnvironmentVariableTarget]::Machine)
          
          Write-Host "Membersihkan file zip..."
          Remove-Item "C:\Android\ndk.zip"
          
          Write-Host "Android NDK siap digunakan di $ndkPath!"
        shell: powershell

      - name: Tampilkan Info Koneksi
        run: |
          Write-Host "========================================"
          Write-Host "RDP Server aktif via Tailscale MagicDNS"
          Write-Host "Username   : Adysetia"
          Write-Host "Host RDP   : rdp-abadi.[NAMA_TAILNET_ANDA]"
          Write-Host "Lokasi NDK : C:\Android\android-ndk-r26d"
          Write-Host "========================================"
        shell: powershell

      - name: Keep-Alive
        run: |
          Write-Host "Sesi aktif. Maksimal 6 jam."
          while ($true) { Start-Sleep -Seconds 300 }
        shell: powershell
        
